];

function timeToMinutes(t) {
  if (!t) return null;
  const [h, m] = t.split(":").map(Number);
  return (h < 6 ? h + 24 : h) * 60 + m;
}

const MY_VOTES_KEY = "tml2026_my_votes"; // local: which artistIds *I* voted for

function App() {
  const [search, setSearch] = useState("");
  const [browseDay, setBrowseDay] = useState(0);
  const [addMode, setAddMode] = useState("browse");
  const [votes, setVotes] = useState({}); // { artistId: count } from server
  const [myVotes, setMyVotes] = useState(() => {
    try { return JSON.parse(localStorage.getItem(MY_VOTES_KEY) || "[]"); } catch (e) { return []; }
  });
  const [activeDay, setActiveDay] = useState(0);
  const [view, setView] = useState("search");
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [configError, setConfigError] = useState(false);

  async function fetchVotes() {
    if (!API_URL || API_URL.includes("COLLE_TON_URL")) {
      setConfigError(true);
      setLoading(false);
      return;
    }
    try {
      const res = await fetch(API_URL);
      const data = await res.json();
      setVotes(data || {});
    } catch (e) {
      console.error("Fetch failed", e);
    }
    setLoading(false);
  }

  useEffect(() => {
    fetchVotes();
    const interval = setInterval(fetchVotes, 5000);
    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    localStorage.setItem(MY_VOTES_KEY, JSON.stringify(myVotes));
  }, [myVotes]);

  async function toggleVote(artistId) {
    const hasVoted = myVotes.includes(artistId);
    const action = hasVoted ? "unvote" : "vote";

    // optimistic UI update
    setMyVotes((prev) => hasVoted ? prev.filter((id) => id !== artistId) : [...prev, artistId]);
    setVotes((prev) => ({ ...prev, [artistId]: Math.max(0, (prev[artistId] || 0) + (hasVoted ? -1 : 1)) }));

    setSyncing(true);
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action, artistId }),
      });
      const data = await res.json();
      if (data.votes) setVotes(data.votes);
    } catch (e) {
      console.error("Vote sync failed", e);
    }
    setSyncing(false);
  }

  const myEntries = useMemo(() => {
    return myVotes
      .map((id) => ALL_ARTISTS.find((a) => `${a.name}-${a.day}` === id))
      .filter(Boolean)
      .map((a) => ({ ...a, artistId: `${a.name}-${a.day}` }));
  }, [myVotes]);

  const filtered = useMemo(() => {
    if (!search.trim()) return [];
    const q = search.toLowerCase();
    return ALL_ARTISTS.filter((a) => a.name.toLowerCase().includes(q)).slice(0, 12);
  }, [search]);

  const browseArtists = useMemo(() => {
    const dayArtists = ALL_ARTISTS.filter((a) => a.day === browseDay);
    const byStage = {};
    dayArtists.forEach((a) => {
      if (!byStage[a.stage]) byStage[a.stage] = [];
      byStage[a.stage].push(a);
    });
    Object.keys(byStage).forEach((s) => byStage[s].sort((a, b) => (timeToMinutes(a.start) ?? 0) - (timeToMinutes(b.start) ?? 0)));
    return byStage;
  }, [browseDay]);

  const daySelected = myEntries.filter((e) => e.day === activeDay);
  const DAY_EMOJIS = ["🌅", "☀️", "🌙"];

  const stagesForDay = useMemo(() => {
    const order = [];
    daySelected.forEach((s) => { if (!order.includes(s.stage)) order.push(s.stage); });
    return order;
  }, [daySelected]);

  const gridBounds = useMemo(() => {
    if (daySelected.length === 0) return { min: 12 * 60, max: 24 * 60 };
    let min = Infinity, max = -Infinity;
    daySelected.forEach((s) => {
      const st = timeToMinutes(s.start), en = timeToMinutes(s.end);
      if (st !== null) min = Math.min(min, st);
      if (en !== null) max = Math.max(max, en);
    });
    min = Math.floor(min / 60) * 60;
    max = Math.ceil(max / 60) * 60;
    return { min, max };
  }, [daySelected]);

  const PX_PER_MIN = 3.2;
  const ROW_HEIGHT = 64;
  const LABEL_WIDTH = 96;

  function formatHourLabel(mins) {
    const h = Math.floor(mins / 60) % 24;
    return `${String(h).padStart(2, "0")}:00`;
  }

  const hourMarks = useMemo(() => {
    const marks = [];
    for (let m = gridBounds.min; m <= gridBounds.max; m += 60) marks.push(m);
    return marks;
  }, [gridBounds]);

  function borderWidthForVotes(count) {
    if (count >= 5) return 4;
    if (count >= 3) return 3;
    if (count >= 1) return 2;
    return 1;
  }

  if (configError) {
    return (
      <div style={{
        minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
        background: "#0a0015", color: "#fff", fontFamily: "system-ui", padding: 24,
      }}>
        <div style={{ maxWidth: 420, textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 14 }}>⚙️</div>
          <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 10, color: "#FFD700" }}>Configuration requise</div>
          <div style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", lineHeight: 1.6 }}>
            Ouvre ce fichier HTML dans un éditeur de texte, trouve la ligne <code style={{ background: "rgba(255,255,255,0.1)", padding: "2px 6px", borderRadius: 4 }}>API_URL</code> tout en haut, et colle l'URL de ton Google Apps Script (voir INSTRUCTIONS.md).
          </div>
        </div>
      </div>
    );
  }

  if (loading) {
    return (
      <div style={{
        minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
        background: "linear-gradient(160deg, #0a0015 0%, #0d001f 45%, #001a0d 100%)", color: "#FFD700",
        fontFamily: "'Segoe UI', system-ui, sans-serif",
      }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 32, marginBottom: 10 }}>🎵</div>
          <div style={{ fontSize: 13, opacity: 0.7 }}>Chargement des votes du groupe…</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(160deg, #0a0015 0%, #0d001f 45%, #001a0d 100%)",
      fontFamily: "'Segoe UI', system-ui, sans-serif",
      color: "#fff",
    }}>
      <div style={{
        background: "linear-gradient(180deg, rgba(255,215,0,0.10) 0%, transparent 100%)",
        borderBottom: "1px solid rgba(255,215,0,0.18)",
        padding: "18px 20px 14px", textAlign: "center", position: "relative",
      }}>
        <div style={{ fontSize: 10, letterSpacing: 5, color: "#FFD700", textTransform: "uppercase", opacity: 0.75, marginBottom: 4 }}>
          Tomorrowland Belgium 2026 · Weekend 1
        </div>
        <div style={{
          fontSize: 24, fontWeight: 900, letterSpacing: 2,
          background: "linear-gradient(90deg, #FFD700 0%, #fff 50%, #FFD700 100%)",
          WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
        }}>MA TIMETABLE</div>
        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 3 }}>
          17 · 18 · 19 Juillet · De Schorre, Boom
        </div>
        {syncing && (
          <div style={{ position: "absolute", top: 18, right: 16, fontSize: 11, color: "rgba(255,255,255,0.4)" }}>💾 sync…</div>
        )}
      </div>

      <div style={{
        textAlign: "center", padding: "8px 16px", fontSize: 11, color: "rgba(255,255,255,0.45)",
        background: "rgba(255,255,255,0.02)", borderBottom: "1px solid rgba(255,255,255,0.06)",
      }}>
        🗳️ Vote pour les artistes que tu veux voir — les votes sont visibles par tout le groupe
      </div>

      <div style={{ display: "flex", justifyContent: "center", gap: 8, padding: "14px 20px 0" }}>
        {[{ key: "search", label: "🔍 Ajouter" }, { key: "timetable", label: "📅 Ma timetable" }].map(({ key, label }) => (
          <button key={key} onClick={() => setView(key)} style={{
            padding: "8px 20px", borderRadius: 20, border: "1px solid",
            borderColor: view === key ? "#FFD700" : "rgba(255,255,255,0.13)",
            background: view === key ? "rgba(255,215,0,0.11)" : "transparent",
            color: view === key ? "#FFD700" : "rgba(255,255,255,0.45)",
            cursor: "pointer", fontSize: 12, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase",
          }}>{label}</button>
        ))}
      </div>

      {view === "search" && (
        <div style={{ padding: "18px 16px 60px", maxWidth: 600, margin: "0 auto" }}>
          <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
            {[{ key: "browse", label: "📋 Parcourir par jour" }, { key: "search", label: "🔍 Rechercher" }].map(({ key, label }) => (
              <button key={key} onClick={() => setAddMode(key)} style={{
                flex: 1, padding: "9px 10px", borderRadius: 10, fontSize: 12, fontWeight: 700,
                background: addMode === key ? "rgba(255,215,0,0.1)" : "rgba(255,255,255,0.03)",
                border: `1px solid ${addMode === key ? "rgba(255,215,0,0.35)" : "rgba(255,255,255,0.08)"}`,
                color: addMode === key ? "#FFD700" : "rgba(255,255,255,0.45)", cursor: "pointer",
              }}>{label}</button>
            ))}
          </div>

          {addMode === "search" ? (
            <>
              <div style={{ position: "relative", marginBottom: 14 }}>
                <input
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="Recherche un artiste… ex: Calvin, Armin, Fisher"
                  style={{
                    width: "100%", padding: "13px 40px 13px 16px", borderRadius: 12,
                    background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.13)",
                    color: "#fff", fontSize: 14, outline: "none", boxSizing: "border-box",
                  }}
                />
                {search && (
                  <button onClick={() => setSearch("")} style={{
                    position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)",
                    background: "none", border: "none", color: "rgba(255,255,255,0.4)", cursor: "pointer", fontSize: 20,
                  }}>×</button>
                )}
              </div>

              {filtered.map((a) => {
                const artistId = `${a.name}-${a.day}`;
                const count = votes[artistId] || 0;
                const voted = myVotes.includes(artistId);
                return (
                  <button key={artistId} onClick={() => toggleVote(artistId)} style={{
                    display: "flex", alignItems: "center", gap: 10, width: "100%",
                    padding: "11px 14px", marginBottom: 5, borderRadius: 10,
                    background: voted ? "rgba(255,215,0,0.08)" : "rgba(255,255,255,0.04)",
                    border: `1px solid ${voted ? "rgba(255,215,0,0.3)" : "rgba(255,255,255,0.09)"}`,
                    color: "#fff", cursor: "pointer", textAlign: "left",
                  }}>
                    <div style={{ width: 9, height: 9, borderRadius: "50%", flexShrink: 0, background: STAGES[a.stage]?.color || "#888" }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600, fontSize: 13 }}>{a.name}</div>
                      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 1 }}>
                        {a.stage} · {DAY_EMOJIS[a.day]} {DAYS[a.day].split(" ")[0]} · {a.start} → {a.end}
                      </div>
                    </div>
                    {count > 0 && (
                      <span style={{ fontSize: 11, color: "#FFD700", fontWeight: 700, marginRight: 4 }}>👍{count}</span>
                    )}
                    <span style={{ fontSize: 18, color: voted ? "#FFD700" : "rgba(255,215,0,0.5)" }}>{voted ? "✓" : "+"}</span>
                  </button>
                );
              })}

              {search && filtered.length === 0 && (
                <div style={{ textAlign: "center", color: "rgba(255,255,255,0.28)", fontSize: 13, padding: "24px 0" }}>
                  Aucun résultat
                </div>
              )}

              {!search && (
                <div style={{ textAlign: "center", padding: "48px 20px", color: "rgba(255,255,255,0.22)" }}>
                  <div style={{ fontSize: 40, marginBottom: 10 }}>🎵</div>
                  <div style={{ fontSize: 14 }}>Tape un nom pour commencer</div>
                </div>
              )}
            </>
          ) : (
            <>
              <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
                {DAYS.map((d, i) => (
                  <button key={i} onClick={() => setBrowseDay(i)} style={{
                    flex: 1, padding: "8px 6px", borderRadius: 10, cursor: "pointer",
                    background: browseDay === i ? "rgba(255,215,0,0.13)" : "rgba(255,255,255,0.03)",
                    border: `1px solid ${browseDay === i ? "rgba(255,215,0,0.48)" : "rgba(255,255,255,0.09)"}`,
                    color: browseDay === i ? "#FFD700" : "rgba(255,255,255,0.4)",
                  }}>
                    <div style={{ fontSize: 12, fontWeight: 700 }}>{DAY_EMOJIS[i]} {d.split(" ")[0]}</div>
                  </button>
                ))}
              </div>

              {Object.entries(browseArtists).map(([stage, artists]) => (
                <div key={stage} style={{ marginBottom: 16 }}>
                  <div style={{
                    display: "flex", alignItems: "center", gap: 6, marginBottom: 6,
                    padding: "4px 8px", borderRadius: 6, background: `${STAGES[stage]?.color}22`,
                  }}>
                    <div style={{ width: 8, height: 8, borderRadius: "50%", background: STAGES[stage]?.color || "#888" }} />
                    <span style={{ fontSize: 12, fontWeight: 800, color: STAGES[stage]?.color || "#fff" }}>{stage}</span>
                  </div>
                  {artists.map((a) => {
                    const artistId = `${a.name}-${a.day}`;
                    const count = votes[artistId] || 0;
                    const voted = myVotes.includes(artistId);
                    return (
                      <button key={artistId} onClick={() => toggleVote(artistId)} style={{
                        display: "flex", alignItems: "center", gap: 10, width: "100%",
                        padding: "9px 12px", marginBottom: 4, borderRadius: 8,
                        background: voted ? "rgba(255,215,0,0.08)" : "rgba(255,255,255,0.03)",
                        border: `1px solid ${voted ? "rgba(255,215,0,0.3)" : "rgba(255,255,255,0.07)"}`,
                        color: "#fff", cursor: "pointer", textAlign: "left",
                      }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 600, fontSize: 13 }}>{a.name}</div>
                          <div style={{ fontSize: 10.5, color: "rgba(255,255,255,0.4)" }}>{a.start} → {a.end}</div>
                        </div>
                        {count > 0 && (
                          <span style={{ fontSize: 11, color: "#FFD700", fontWeight: 700, marginRight: 4 }}>👍{count}</span>
                        )}
                        <span style={{ fontSize: 16, color: voted ? "#FFD700" : "rgba(255,215,0,0.5)" }}>{voted ? "✓" : "+"}</span>
                      </button>
                    );
                  })}
                </div>
              ))}
            </>
          )}

          {myEntries.length > 0 && (
            <>
              <div style={{ fontSize: 10, letterSpacing: 4, color: "rgba(255,255,255,0.35)", textTransform: "uppercase", margin: "24px 0 10px" }}>
                Mes votes · {myEntries.length}
              </div>
              {[0, 1, 2].map((dayIdx) => {
                const items = myEntries.filter((s) => s.day === dayIdx);
                if (!items.length) return null;
                return (
                  <div key={dayIdx} style={{ marginBottom: 18 }}>
                    <div style={{ fontSize: 12, color: "#FFD700", fontWeight: 700, marginBottom: 6 }}>
                      {DAY_EMOJIS[dayIdx]} {DAYS[dayIdx]}
                    </div>
                    {items.map((item) => (
                      <div key={item.artistId} style={{
                        marginBottom: 5, borderRadius: 10, background: "rgba(255,255,255,0.03)",
                        border: "1px solid rgba(255,255,255,0.08)", overflow: "hidden",
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 12px" }}>
                          <div style={{ width: 8, height: 8, borderRadius: "50%", background: STAGES[item.stage]?.color || "#888", flexShrink: 0 }} />
                          <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 600, fontSize: 13 }}>{item.name}</div>
                            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.38)", marginTop: 1 }}>
                              {item.stage} · {item.start} → {item.end} · 👍{votes[item.artistId] || 0}
                            </div>
                          </div>
                          <button onClick={() => toggleVote(item.artistId)} style={{
                            padding: "3px 8px", borderRadius: 5, background: "rgba(255,80,80,0.08)",
                            border: "1px solid rgba(255,80,80,0.18)", color: "rgba(255,100,100,0.8)", cursor: "pointer", fontSize: 14,
                          }}>×</button>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </>
          )}
        </div>
      )}

      {view === "timetable" && (
        <div style={{ padding: "18px 14px 60px" }}>
          <div style={{ display: "flex", gap: 6, justifyContent: "center", marginBottom: 18 }}>
            {DAYS.map((d, i) => {
              const cnt = myEntries.filter((s) => s.day === i).length;
              return (
                <button key={i} onClick={() => setActiveDay(i)} style={{
                  padding: "8px 13px", borderRadius: 10, cursor: "pointer",
                  background: activeDay === i ? "rgba(255,215,0,0.13)" : "rgba(255,255,255,0.03)",
                  border: `1px solid ${activeDay === i ? "rgba(255,215,0,0.48)" : "rgba(255,255,255,0.09)"}`,
                  color: activeDay === i ? "#FFD700" : "rgba(255,255,255,0.4)",
                }}>
                  <div style={{ fontSize: 13, fontWeight: 700 }}>{DAY_EMOJIS[i]} {d.split(" ")[0]}</div>
                  <div style={{ fontSize: 10, opacity: 0.65, marginTop: 2 }}>{d.split(" ").slice(1).join(" ")}</div>
                  {cnt > 0 && <div style={{ fontSize: 10, color: "#FFD700", marginTop: 3 }}>{cnt} set{cnt > 1 ? "s" : ""}</div>}
                </button>
              );
            })}
          </div>

          {daySelected.length === 0 ? (
            <div style={{ textAlign: "center", padding: "60px 20px", color: "rgba(255,255,255,0.22)" }}>
              <div style={{ fontSize: 34, marginBottom: 10 }}>🗓️</div>
              <div style={{ fontSize: 14 }}>Aucun artiste pour ce jour</div>
              <div style={{ fontSize: 12, marginTop: 6, opacity: 0.6 }}>Va dans "Ajouter" pour voter</div>
            </div>
          ) : (
            <>
              <div style={{
                overflowX: "auto", overflowY: "hidden", borderRadius: 12,
                border: "1px solid rgba(255,255,255,0.08)", background: "rgba(0,0,0,0.25)",
                WebkitOverflowScrolling: "touch",
              }}>
                <div style={{ width: LABEL_WIDTH + (gridBounds.max - gridBounds.min) * PX_PER_MIN + 16, position: "relative" }}>
                  <div style={{ display: "flex", position: "sticky", top: 0, zIndex: 3, background: "#13021f", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
                    <div style={{ width: LABEL_WIDTH, flexShrink: 0, borderRight: "1px solid rgba(255,255,255,0.08)" }} />
                    <div style={{ position: "relative", height: 30, flex: 1 }}>
                      {hourMarks.map((m) => (
                        <div key={m} style={{
                          position: "absolute", left: (m - gridBounds.min) * PX_PER_MIN,
                          top: 0, height: "100%", display: "flex", alignItems: "center",
                          fontSize: 11, color: "rgba(255,255,255,0.45)", paddingLeft: 4,
                          borderLeft: "1px solid rgba(255,255,255,0.07)", minWidth: 1,
                        }}>{formatHourLabel(m)}</div>
                      ))}
                    </div>
                  </div>

                  {stagesForDay.map((stage) => {
                    const sc = STAGES[stage] || { color: "#888", text: "#fff" };
                    const stageItems = daySelected.filter((s) => s.stage === stage);
                    return (
                      <div key={stage} style={{ display: "flex", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                        <div style={{
                          width: LABEL_WIDTH, flexShrink: 0, borderRight: "1px solid rgba(255,255,255,0.08)",
                          display: "flex", alignItems: "center", padding: "0 8px", background: "rgba(255,255,255,0.02)",
                        }}>
                          <div>
                            <div style={{ width: 8, height: 8, borderRadius: "50%", background: sc.color, marginBottom: 4 }} />
                            <div style={{ fontSize: 10.5, fontWeight: 700, lineHeight: 1.25, color: "rgba(255,255,255,0.85)" }}>{stage}</div>
                          </div>
                        </div>
                        <div style={{ position: "relative", height: ROW_HEIGHT, flex: 1 }}>
                          {hourMarks.map((m) => (
                            <div key={m} style={{
                              position: "absolute", left: (m - gridBounds.min) * PX_PER_MIN, top: 0, bottom: 0,
                              borderLeft: "1px solid rgba(255,255,255,0.05)",
                            }} />
                          ))}
                          {stageItems.map((item) => {
                            const st = timeToMinutes(item.start);
                            const en = timeToMinutes(item.end);
                            const left = (st - gridBounds.min) * PX_PER_MIN;
                            const width = Math.max((en - st) * PX_PER_MIN - 3, 30);
                            const count = votes[item.artistId] || 0;
                            const bw = borderWidthForVotes(count);
                            return (
                              <div key={item.artistId} title={`${item.name} · ${item.start}–${item.end} · ${count} vote(s)`} style={{
                                position: "absolute", left, top: 6, width, height: ROW_HEIGHT - 12,
                                background: sc.color, color: sc.text, borderRadius: 7,
                                padding: "5px 7px", overflow: "hidden", boxSizing: "border-box",
                                border: `${bw}px solid rgba(255,255,255,0.9)`,
                                boxShadow: "0 1px 3px rgba(0,0,0,0.3)",
                              }}>
                                <div style={{ fontSize: 11.5, fontWeight: 800, lineHeight: 1.15, whiteSpace: "nowrap", textOverflow: "ellipsis", overflow: "hidden" }}>
                                  {item.name}
                                </div>
                                <div style={{ fontSize: 9.5, opacity: 0.8, marginTop: 2, whiteSpace: "nowrap" }}>
                                  {item.start}–{item.end} · 👍{count}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div style={{ textAlign: "center", fontSize: 10.5, color: "rgba(255,255,255,0.3)", marginTop: 8 }}>
                ← fais glisser horizontalement · bordure plus épaisse = plus de votes →
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
